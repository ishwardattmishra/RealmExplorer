name: Publish Extension

on:
  push:
    branches:
      - main

jobs:
  publish:
    name: Publish for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: win32-x64
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-latest
            target: darwin-x64
          - os: macos-latest
            target: darwin-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm run test:all

      - name: Build
        run: npm run compile

      - name: Publish to Marketplace
        shell: bash
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish --target "${{ matrix.target }}" --no-dependencies

      # package.json publisher stays IshwarDattMishra for VS Marketplace (vsce above).
      # Open VSX uses a separate namespace (default ishwardattmishra); override with repo variable OPEN_VSX_PUBLISHER.
      - name: Publish to Open VSX
        shell: bash
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
          OPEN_VSX_PUBLISHER: ${{ vars.OPEN_VSX_PUBLISHER }}
        run: |
          node scripts/set-openvsx-publisher.js
          npx ovsx -p "$OVSX_PAT" publish --target "${{ matrix.target }}" --no-dependencies
