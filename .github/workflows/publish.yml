name: Publish Extension

on:
  push:
    branches:
      - main

jobs:
  publish:
    name: Publish for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: win32-x64
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-latest
            target: darwin-x64
          - os: macos-latest
            target: darwin-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Verify realm native module installed correctly for this platform
      - name: Verify Realm module
        shell: bash
        run: |
          echo "Checking realm installation..."
          if [ -f "node_modules/realm/prebuilds/node/realm.node" ]; then
            echo "✓ Realm native binary found"
            file node_modules/realm/prebuilds/node/realm.node || true
            ls -lh node_modules/realm/prebuilds/node/realm.node
          else
            echo "✗ Realm native binary not found!"
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm run test:all

      - name: Build
        run: npm run compile

      # Verify what will be packaged
      - name: Preview package contents
        shell: bash
        run: |
          echo "Files to be included in VSIX:"
          npx @vscode/vsce ls | grep -E "realm|prebuilds" | head -20 || echo "No realm files preview (this is expected if too many files)"
          echo ""
          echo "Checking realm.node will be included:"
          npx @vscode/vsce ls | grep "realm\.node" && echo "✓ Native binary will be included" || echo "✗ WARNING: Native binary not found!"

      # Do NOT pass --no-dependencies: vsce then skips npm dependency paths and never collects
      # files under node_modules/ (glob uses ignore: node_modules/** on cwd only). Realm must
      # be included via npm list + .vscodeignore (!node_modules/realm/...).
      - name: Publish to Marketplace
        shell: bash
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish --target "${{ matrix.target }}"

      # package.json publisher stays IshwarDattMishra for VS Marketplace (vsce above).
      # Open VSX uses a separate namespace (default ishwardattmishra); override with repo variable OPEN_VSX_PUBLISHER.
      - name: Publish to Open VSX
        shell: bash
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
          OPEN_VSX_PUBLISHER: ${{ vars.OPEN_VSX_PUBLISHER }}
        run: |
          node scripts/set-openvsx-publisher.js
          npx ovsx -p "$OVSX_PAT" publish --target "${{ matrix.target }}"
